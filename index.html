<!DOCTYPE html>
<!-- data-theme attribute controls initial Leaflet tile style (flyer = voyager tiles) -->
<html lang="fi" data-theme="flyer">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pääpäivä</title>
  <link rel="icon" href="/hand-drawn-sun.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/src/styles/layout.css?v=0.1.2" />
  <link rel="stylesheet" id="theme-link" href="/src/styles/theme-flyer.css?v=0.1.2" />
</head>
<body>
  <header id="app-header">
    <div class="header-brand">
      <img src="/hand-drawn-sun.svg" alt="" class="header-sun" width="54" height="52" aria-hidden="true" />
      <h1>Pääpäivä 18.7.2026</h1>
    </div>
    <div class="header-controls">
      <span class="theme-picker-label">Teema:</span>
      <select id="theme-picker" aria-label="Vaihda teemaa / Change theme">
        <option value="theme-flyer" selected>Flyer</option>
        <option value="theme-default">Default</option>
        <option value="theme-riso">Riso</option>
        <option value="theme-handdrawn">Hand-drawn</option>
        <option value="theme-darkroom">Darkroom</option>
      </select>
      <button id="lang-toggle" class="lang-toggle" aria-label="Switch language">EN</button>
    </div>
  </header>

  <div id="filter-bar">
    <div id="time-filters"></div>
    <div id="tag-filters"></div>
  </div>

  <nav id="mobile-tabs" aria-label="Näkymä / View">
    <button class="mobile-tab mobile-tab--active" id="tab-map">Kartta</button>
    <button class="mobile-tab" id="tab-list">Lista</button>
  </nav>

  <div id="content-area">
    <aside id="location-panel">
      <ul id="location-list"></ul>
    </aside>

    <div id="map-wrapper">
      <div id="map"></div>
      <aside id="location-sidebar" class="sidebar sidebar--hidden">
        <button id="sidebar-close" aria-label="Sulje / Close">×</button>
        <div class="sidebar-content">
          <h2 class="sidebar-title"></h2>
          <p class="sidebar-address"></p>
          <p class="sidebar-time"></p>
          <p class="sidebar-description"></p>
          <div class="sidebar-tags"></div>
        </div>
      </aside>
    </div>
  </div>

  <div id="loading-overlay">
    <div class="loading-spinner"></div>
    <p id="loading-status">Ladataan... / Loading...</p>
  </div>

  <script type="module" src="/src/main.js?v=0.1.2"></script>
</body>
</html>
