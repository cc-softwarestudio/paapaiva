<!DOCTYPE html>
<!-- data-theme: flyer = blue-water map | remove for default gray tiles -->
<html lang="fi" data-theme="flyer">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pääpäivä</title>
  <!-- <link rel="stylesheet" href="/src/styles/style.css" /> -->
  <!-- <link rel="stylesheet" href="/src/styles/style-variant-1-riso.css" /> -->
  <!-- <link rel="stylesheet" href="/src/styles/style-variant-2-handdrawn.css" /> -->
  <!-- <link rel="stylesheet" href="/src/styles/style-variant-3-darkroom.css" /> -->
  <link rel="stylesheet" href="/src/styles/style-variant-4-flyer.css" />
</head>
<body>
  <header id="app-header">
    <h1>Pääpäivä 18.7.2026</h1>
    <button id="lang-toggle" class="lang-toggle" aria-label="Switch language">EN</button>
  </header>

  <div id="filter-bar">
    <div id="time-filters"></div>
    <div id="tag-filters"></div>
  </div>

  <div id="map-wrapper">
    <div id="map"></div>
    <aside id="location-sidebar" class="sidebar sidebar--hidden">
      <button id="sidebar-close" aria-label="Sulje / Close">×</button>
      <div class="sidebar-content">
        <h2 class="sidebar-title"></h2>
        <p class="sidebar-address"></p>
        <p class="sidebar-time"></p>
        <p class="sidebar-description"></p>
        <div class="sidebar-tags"></div>
      </div>
    </aside>
  </div>

  <section id="location-list-section">
    <ul id="location-list"></ul>
  </section>

  <div id="loading-overlay">
    <div class="loading-spinner"></div>
    <p id="loading-status">Ladataan... / Loading...</p>
  </div>

  <script type="module" src="/src/main.js?v=0.1.0"></script>
</body>
</html>
